<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Platform Downloader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>SocMed Downloader</h1>
        <p>Download video dari TikTok, IG, Twitter, & YouTube</p>
        
        <div class="input-group">
            <input type="text" id="videoUrl" placeholder="Tempel link video di sini...">
            <button onclick="handleDownload()">Ambil Video</button>
        </div>

        <div id="result" class="result-container">
            <!-- Hasil download akan muncul di sini -->
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
